services:
  - type: web
    name: visuales-bot
    runtime: python
    repo: https://github.com/DarckNemesys/visuales-bot
    plan: free
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: WEBHOOK_URL
        value: https://visuales-bot.onrender.com
    buildCommand: pip install -r requirements.txt
    startCommand: python bot_descargador.py