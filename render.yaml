services:
  - type: web
    name: visuales-bot
    runtime: python
    repo: https://github.com/tu-usuario/tu-repo
    plan: free
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_URL
        value: https://visuales-bot.onrender.com
    buildCommand: pip install -r requirements.txt
    startCommand: python bot_webhook.py
